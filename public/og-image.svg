<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#skyGradient)"/>
  
  <!-- Icon 🔢 -->
  <text x="600" y="200" font-size="120" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">
    🔢
  </text>
  
  <!-- Title -->
  <text x="600" y="380" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" letter-spacing="-1">
    Word Counter
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="460" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    Count Words &amp; Characters
  </text>
</svg>